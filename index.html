<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог техніки DLight 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── ЗМІННІ ─────────────────────────────────────────────── */
:root {
  --bg:        #f0f2f5;
  --white:     #ffffff;
  --border:    #dde2ec;
  --border-hi: #2563eb;
  --text:      #1a202c;
  --muted:     #64748b;
  --accent:    #2563eb;
  --accent-lt: #eff6ff;
  --row-hi:    #f5f8ff;
  --hdr-bg:    #1e293b;
  --hdr-txt:   #f1f5f9;
  --tag-bg:    #dbeafe;
  --tag-txt:   #1d4ed8;
  --radius:    6px;
  --shadow:    0 1px 4px rgba(0,0,0,.07);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ─────────────────────────────────────────────── */
.hdr{
  background:var(--hdr-bg);color:var(--hdr-txt);
  padding:.7rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  position:sticky;top:0;z-index:60;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.hdr-logo{display:flex;align-items:center;gap:.55rem}
.hdr-logo svg{flex-shrink:0}
.hdr-name{font-size:1rem;font-weight:700;letter-spacing:.03em}
.hdr-name span{color:#60a5fa}
.hdr-meta{font-size:.72rem;color:#94a3b8;text-align:right;line-height:1.5}
.hdr-meta b{color:#93c5fd}
.hdr-updated{font-size:.66rem;color:#475569}

/* ── ФІЛЬТР-ПАНЕЛЬ ──────────────────────────────────────── */
.fp{
  background:var(--white);
  border-bottom:2px solid var(--border);
  padding:.8rem 1.5rem .7rem;
}
.fp-title{
  font-size:.65rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--muted);margin-bottom:.55rem;
}

/* Сітка select-фільтрів */
.fp-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:.5rem;
  margin-bottom:.6rem;
}
.fp-col{display:flex;flex-direction:column;gap:.18rem}
.fp-lbl{
  font-size:.67rem;font-weight:600;color:var(--muted);
  letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fp-sel{
  width:100%;height:86px;
  border:1px solid var(--border);border-radius:var(--radius);
  padding:.12rem .2rem;
  font-family:inherit;font-size:.75rem;color:var(--text);
  background:var(--white);outline:none;cursor:pointer;
  transition:border-color .15s,box-shadow .15s;
}
.fp-sel:focus{border-color:var(--border-hi);box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.fp-sel option.all{color:var(--muted);font-style:italic}

/* Рядок текстових фільтрів */
.fp-txt-row{
  display:flex;flex-wrap:wrap;gap:.45rem;
  padding-top:.5rem;border-top:1px solid #eef2f7;
}
.fp-txt-col{display:flex;flex-direction:column;gap:.18rem;flex:1 1 140px;max-width:230px;min-width:130px}
.fp-inp{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:.32rem .5rem;
  font-family:inherit;font-size:.75rem;color:var(--text);
  outline:none;transition:border-color .15s,box-shadow .15s;
  background:var(--white);
}
.fp-inp::placeholder{color:#b0bec5}
.fp-inp:focus{border-color:var(--border-hi);box-shadow:0 0 0 2px rgba(37,99,235,.12)}

/* ── TOOLBAR ────────────────────────────────────────────── */
.tb{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:.4rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:.7rem;flex-wrap:wrap;min-height:38px;
}
.tb-l{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}
.ri{font-size:.73rem;color:var(--muted);white-space:nowrap}
.ri b{color:var(--text)}
.tags{display:flex;flex-wrap:wrap;gap:.22rem}
.tag{
  display:inline-flex;align-items:center;gap:.2rem;
  background:var(--tag-bg);color:var(--tag-txt);
  border-radius:3px;padding:.1rem .32rem;
  font-size:.64rem;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:background .12s;
}
.tag:hover{background:#bfdbfe}
.btn-reset{
  background:none;border:1px solid var(--border);border-radius:var(--radius);
  padding:.22rem .55rem;font-size:.7rem;cursor:pointer;
  color:var(--muted);font-family:inherit;white-space:nowrap;transition:all .12s;
}
.btn-reset:hover{border-color:#ef4444;color:#ef4444}
.view-tog{display:flex;gap:.18rem}
.vb{
  border:1px solid var(--border);background:var(--white);
  border-radius:var(--radius);padding:.22rem .5rem;
  cursor:pointer;font-size:.72rem;color:var(--muted);
  font-family:inherit;white-space:nowrap;transition:all .12s;
}
.vb.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── TABLE ──────────────────────────────────────────────── */
.tw{padding:.8rem 1.5rem;overflow-x:auto}
table{
  width:100%;border-collapse:collapse;
  background:var(--white);border-radius:8px;overflow:hidden;
  box-shadow:var(--shadow);font-size:.74rem;
}
thead tr{background:#f1f5f9}
th{
  padding:.45rem .6rem;text-align:left;
  font-weight:700;color:var(--muted);
  font-size:.63rem;letter-spacing:.05em;text-transform:uppercase;
  border-bottom:2px solid var(--border);white-space:nowrap;
  cursor:pointer;user-select:none;background:#f1f5f9;
}
th:hover{color:var(--accent)}
th.asc::after{content:' ↑';color:var(--accent)}
th.desc::after{content:' ↓';color:var(--accent)}
td{
  padding:.36rem .6rem;border-bottom:1px solid #f0f4f9;
  color:var(--text);max-width:200px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
tr:hover td{background:var(--row-hi)}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer}

/* ── GRID ────────────────────────────────────────────────── */
.gw{padding:.8rem 1.5rem;display:none}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.7rem}
.card{
  background:var(--white);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,transform .15s;
}
.card:hover{box-shadow:0 4px 18px rgba(37,99,235,.12);transform:translateY(-2px)}
.card-img{
  width:100%;aspect-ratio:16/10;background:#f5f8ff;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;color:#d0d7e0;overflow:hidden;
}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:.55rem}
.card-cat{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700;margin-bottom:.12rem}
.card-name{font-size:.78rem;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-sub{margin-top:.28rem;font-size:.68rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── PAGINATION ─────────────────────────────────────────── */
.pag{display:flex;align-items:center;justify-content:center;gap:.22rem;padding:.8rem}
.pb{
  border:1px solid var(--border);background:var(--white);border-radius:4px;
  padding:.25rem .5rem;font-size:.72rem;cursor:pointer;
  color:var(--text);font-family:inherit;min-width:28px;text-align:center;
  transition:all .1s;
}
.pb:hover{border-color:var(--accent);color:var(--accent)}
.pb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pb:disabled{opacity:.35;cursor:default}

/* ── MODAL ──────────────────────────────────────────────── */
.mo{
  display:none;position:fixed;inset:0;
  background:rgba(15,23,42,.52);z-index:200;
  align-items:center;justify-content:center;padding:1.5rem;
}
.mo.open{display:flex}
.modal{
  background:var(--white);border-radius:10px;
  max-width:700px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.2);
  animation:mIn .18s ease;
}
@keyframes mIn{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
.mhd{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:1rem 1.2rem .75rem;border-bottom:1px solid var(--border);gap:1rem;
}
.mhd-t{font-size:.95rem;font-weight:700;line-height:1.3}
.mcl{
  background:none;border:none;font-size:1.3rem;cursor:pointer;
  color:var(--muted);flex-shrink:0;transition:color .12s;padding:.1rem .3rem;line-height:1;
}
.mcl:hover{color:#ef4444}
.m-img{width:100%;max-height:240px;object-fit:contain;background:#f5f8ff}
.m-gallery{display:flex;gap:.4rem;padding:.75rem 1.1rem .3rem;flex-wrap:wrap;background:#f5f8ff}
.m-gallery img{height:110px;width:auto;max-width:180px;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.m-gallery img:hover,.m-gallery img.active{border-color:var(--accent)}
.m-fields{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;padding:.8rem 1.1rem 1rem}
.mf{background:#f8fafc;border:1px solid #eef2f7;border-radius:5px;padding:.42rem .6rem}
.mf-k{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.12rem}
.mf-v{font-size:.8rem;word-break:break-word}
.mf-v a{color:var(--accent);text-decoration:none}
.mf-v a:hover{text-decoration:underline}

/* ── STATES ─────────────────────────────────────────────── */
.st{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;gap:.6rem;color:var(--muted);text-align:center}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── TOAST ──────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:1.2rem;right:1.5rem;
  background:var(--hdr-bg);color:var(--hdr-txt);
  border-radius:6px;padding:.45rem .9rem;font-size:.73rem;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:300;
}
.toast.show{opacity:1}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:600px){
  .fp-grid{grid-template-columns:repeat(2,1fr)}
  .m-fields{grid-template-columns:1fr}
  .hdr{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="#2563eb"/>
      <path d="M7 8h8c3.3 0 6 2.7 6 6s-2.7 6-6 6H7V8z" fill="white"/>
      <circle cx="15" cy="14" r="2.5" fill="#2563eb"/>
    </svg>
    <div class="hdr-name">D<span>LIGHT</span> Каталог</div>
  </div>
  <div class="hdr-meta">
    Позицій: <b id="total-count">…</b>
    <div class="hdr-updated" id="hdr-updated"></div>
  </div>
</header>

<!-- ФІЛЬТРИ -->
<div class="fp">
  <div class="fp-title">🔍 Фільтри</div>
  <div class="fp-grid" id="fp-grid">
    <div class="st" style="grid-column:1/-1;padding:.8rem"><div class="spin"></div></div>
  </div>
  <div class="fp-txt-row" id="fp-txt"></div>
</div>

<!-- TOOLBAR -->
<div class="tb">
  <div class="tb-l">
    <div class="ri" id="ri">Завантаження…</div>
    <div class="tags" id="tags"></div>
    <button class="btn-reset" onclick="resetAll()">✕ Скинути</button>
  </div>
  <div class="view-tog">
    <button class="vb on" id="vb-t" onclick="setView('table')">☰ Таблиця</button>
    <button class="vb" id="vb-g" onclick="setView('grid')">⊞ Картки</button>
  </div>
</div>

<!-- TABLE / GRID -->
<div class="tw" id="tw"></div>
<div class="gw" id="gw"><div class="cards" id="cards"></div></div>

<!-- PAGINATION -->
<div class="pag" id="pag"></div>

<!-- MODAL -->
<div class="mo" id="mo">
  <div class="modal">
    <div class="mhd">
      <div class="mhd-t" id="m-title">—</div>
      <button class="mcl" onclick="closeMo()">×</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  ⚙️  КОНФІГУРАЦІЯ — замінити після розгортання Apps Script
// ══════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwuMI8G60osTkILi1vSPFYzjPDXK3QwkLx7tufPmlu40jDtcKjFwmfaUMEzRmhVqOYL8g/exec';
//  Вставте сюди URL вашого веб-додатку Apps Script
//  Приклад: 'https://script.google.com/macros/s/AKfycb.../exec'

// ══════════════════════════════════════════════════════════════

const PAGE_SIZE      = 50;
const MAX_SEL_UNIQ   = 200;   // ≤ цього → select-фільтр
const MAX_SEL_COLS   = 14;
const MAX_TXT_COLS   = 6;

let allRows=[], headers=[];
let apiImageColumns=[];
let selF=[], txtF=[];
let imgCol=null, nameCol=null;
let selV={}, txtV={};
let sortCol=null, sortDir=1;
let view='table', page=1;

// ── UTIL ─────────────────────────────────────────────────────
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isUrl = v => /^https?:\/\//i.test(v);
const isImg = v => /\.(jpg|jpeg|png|gif|webp|svg)/i.test(v)||/drive\.google|googleusercontent|lh\d\.google/i.test(v);

function toast(msg, ms=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),ms);
}

// ── DETECT COLUMNS ───────────────────────────────────────────
function detectCols(){
  // imgCol — перша колонка з фото (з API або по ключовому слову)
  if(apiImageColumns && apiImageColumns.length>0){
    imgCol = apiImageColumns[0];
  } else {
    imgCol = headers.find(h=>/фото|photo|image|img|зображ|картинк/i.test(h)||allRows.slice(0,5).some(r=>isImg(r[h])))||null;
  }
  nameCol = headers.find(h=>/назва|найменування|name|товар|продукт|модель/i.test(h))||headers.find(h=>h!==imgCol&&(!apiImageColumns||!apiImageColumns.includes(h)))||headers[0];

  const allImgCols = new Set(apiImageColumns || (imgCol ? [imgCol] : []));

  const uniq={};
  headers.forEach(h=>{ uniq[h]=new Set(allRows.map(r=>r[h]).filter(Boolean)).size; });

  const selCand = headers
    .filter(h=>!allImgCols.has(h) && uniq[h]>=2 && uniq[h]<=MAX_SEL_UNIQ)
    .sort((a,b)=>uniq[a]-uniq[b]).slice(0,MAX_SEL_COLS);
  selF = selCand.map(col=>({col}));

  const used=new Set(selCand);
  const txtCand = headers.filter(h=>!allImgCols.has(h)&&!used.has(h)&&uniq[h]>=2).slice(0,MAX_TXT_COLS);
  txtF = txtCand.map(col=>({col}));

  selF.forEach(f=>selV[f.col]='');
  txtF.forEach(f=>txtV[f.col]='');
}

// ── BUILD FILTERS ────────────────────────────────────────────
function buildFilters(){
  const grid=document.getElementById('fp-grid');
  grid.innerHTML='';

  selF.forEach(({col})=>{
    const opts=[...new Set(allRows.map(r=>r[col]).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'uk'));
    const div=document.createElement('div'); div.className='fp-col';
    div.innerHTML=`<div class="fp-lbl" title="${esc(col)}">${esc(col)}:</div>`;
    const sel=document.createElement('select'); sel.className='fp-sel'; sel.size=4; sel.dataset.col=col;
    const allOpt=new Option('Все',''); allOpt.className='all'; sel.add(allOpt);
    opts.forEach(v=>sel.add(new Option(v,v)));
    sel.addEventListener('change',()=>{ selV[col]=sel.value; page=1; render(); renderTags(); });
    div.appendChild(sel); grid.appendChild(div);
  });

  const txtRow=document.getElementById('fp-txt'); txtRow.innerHTML='';
  txtF.forEach(({col})=>{
    const div=document.createElement('div'); div.className='fp-txt-col';
    div.innerHTML=`<div class="fp-lbl" title="${esc(col)}">${esc(col)}:</div>`;
    const inp=document.createElement('input'); inp.type='text'; inp.className='fp-inp'; inp.placeholder='Пошук…'; inp.dataset.col=col;
    inp.addEventListener('input',()=>{ txtV[col]=inp.value.trim(); page=1; render(); renderTags(); });
    div.appendChild(inp); txtRow.appendChild(div);
  });
}

// ── FILTERING ────────────────────────────────────────────────
function filtered(){
  return allRows.filter(row=>{
    for(const[c,v] of Object.entries(selV)) if(v&&row[c]!==v) return false;
    for(const[c,v] of Object.entries(txtV)) if(v&&!String(row[c]??'').toLowerCase().includes(v.toLowerCase())) return false;
    return true;
  });
}

// ── TAGS ─────────────────────────────────────────────────────
function renderTags(){
  const w=document.getElementById('tags'); w.innerHTML='';
  const add=(col,v,clear)=>{
    const t=document.createElement('div'); t.className='tag';
    t.innerHTML=`${esc(col)}: <b>${esc(v)}</b> ×`;
    t.onclick=clear; w.appendChild(t);
  };
  selF.forEach(({col})=>{ const v=selV[col]; if(!v) return;
    add(col,v,()=>{ selV[col]=''; const s=document.querySelector(`select[data-col="${CSS.escape(col)}"]`); if(s)s.value=''; page=1; render(); renderTags(); });
  });
  txtF.forEach(({col})=>{ const v=txtV[col]; if(!v) return;
    add(col,v,()=>{ txtV[col]=''; const i=document.querySelector(`input[data-col="${CSS.escape(col)}"]`); if(i)i.value=''; page=1; render(); renderTags(); });
  });
}

function resetAll(){
  selF.forEach(f=>selV[f.col]=''); txtF.forEach(f=>txtV[f.col]='');
  document.querySelectorAll('select.fp-sel').forEach(s=>s.value='');
  document.querySelectorAll('input.fp-inp').forEach(i=>i.value='');
  page=1; sortCol=null; sortDir=1; render(); renderTags();
}

// ── SORT / PAGINATE ──────────────────────────────────────────
function sorted(rows){
  if(!sortCol) return rows;
  return [...rows].sort((a,b)=>{
    const av=a[sortCol]??'', bv=b[sortCol]??'';
    const an=parseFloat(String(av).replace(/[^\d.-]/g,'')), bn=parseFloat(String(bv).replace(/[^\d.-]/g,''));
    if(!isNaN(an)&&!isNaN(bn)) return (an-bn)*sortDir;
    return String(av).localeCompare(String(bv),'uk')*sortDir;
  });
}
function paginate(rows){ const p=Math.ceil(rows.length/PAGE_SIZE)||1; page=Math.min(page,p); return rows.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE); }

// ── RENDER ───────────────────────────────────────────────────
function render(){
  let rows=filtered(); const total=rows.length;
  document.getElementById('ri').innerHTML=`Знайдено: <b>${total}</b> з <b>${allRows.length}</b>`;
  rows=sorted(rows); const pr=paginate(rows);
  if(view==='table') renderTable(pr); else renderGrid(pr);
  renderPag(total);
}

function renderTable(pr){
  const w=document.getElementById('tw');
  if(!pr.length){ w.innerHTML='<div class="st">🔍<div>Нічого не знайдено</div></div>'; return; }
  const vis=headers.filter(h=>h!==imgCol);
  let h='<table><thead><tr>';
  vis.forEach(c=>{ const cl=sortCol===c?(sortDir===1?' asc':' desc'):''; h+=`<th class="${cl}" data-col="${esc(c)}">${esc(c)}</th>`; });
  h+='</tr></thead><tbody>';
  pr.forEach((row,i)=>{ h+=`<tr data-i="${i}">`; vis.forEach(c=>{ const v=row[c]??''; h+=isUrl(v)?`<td><a href="${esc(v)}" target="_blank" onclick="event.stopPropagation()">🔗</a></td>`:`<td title="${esc(v)}">${esc(v)}</td>`; }); h+='</tr>'; });
  h+='</tbody></table>'; w.innerHTML=h;
  w.querySelectorAll('th').forEach(th=>{ th.onclick=()=>{ const c=th.dataset.col; if(sortCol===c)sortDir*=-1; else{sortCol=c;sortDir=1;} render(); }; });
  w.querySelectorAll('tbody tr').forEach((tr,i)=>{ tr.onclick=()=>openMo(pr[i]); });
}

function renderGrid(pr){
  const g=document.getElementById('cards');
  if(!pr.length){ g.innerHTML='<div class="st" style="grid-column:1/-1">🔍<div>Нічого не знайдено</div></div>'; return; }
  const allImgCols = apiImageColumns.length>0 ? apiImageColumns : (imgCol?[imgCol]:[]);
  const catC=selF[0]?.col;
  const subC=headers.find(h=>!allImgCols.includes(h)&&h!==nameCol&&h!==catC)||null;
  g.innerHTML='';
  pr.forEach(row=>{
    const card=document.createElement('div'); card.className='card'; card.onclick=()=>openMo(row);
    // беремо перше непорожнє фото
    const src = allImgCols.map(c=>row[c]).find(v=>v&&isImg(v)) || '';
    const imgH=(src)?`<div class="card-img"><img src="${esc(src)}" loading="lazy" onerror="this.parentElement.innerHTML='📦'"></div>`:`<div class="card-img">📦</div>`;
    const cat=catC&&row[catC]?`<div class="card-cat">${esc(row[catC])}</div>`:'';
    const sub=subC&&row[subC]?`<div class="card-sub">${esc(row[subC])}</div>`:'';
    card.innerHTML=imgH+`<div class="card-body">${cat}<div class="card-name">${esc(row[nameCol]??'—')}</div>${sub}</div>`;
    g.appendChild(card);
  });
}

function renderPag(total){
  const pages=Math.ceil(total/PAGE_SIZE); const w=document.getElementById('pag');
  if(pages<=1){w.innerHTML='';return;}
  let h=`<button class="pb" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  const r=[]; for(let i=1;i<=pages;i++){ if(i===1||i===pages||Math.abs(i-page)<=2)r.push(i); else if(r[r.length-1]!=='…')r.push('…'); }
  r.forEach(p=>{ if(p==='…')h+=`<span class="pb" style="cursor:default;pointer-events:none">…</span>`; else h+=`<button class="pb ${p===page?'on':''}" onclick="goPage(${p})">${p}</button>`; });
  h+=`<button class="pb" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
  w.innerHTML=h;
}
function goPage(p){ page=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

// ── MODAL ────────────────────────────────────────────────────
function openMo(row){
  document.getElementById('m-title').textContent=row[nameCol]??'—';
  const allImgCols = apiImageColumns.length>0 ? apiImageColumns : (imgCol?[imgCol]:[]);
  const photos = allImgCols.map(c=>row[c]).filter(v=>v&&isImg(v));

  let h='';
  if(photos.length===1){
    h+=`<img class="m-img" src="${esc(photos[0])}" onerror="this.style.display='none'">`;
  } else if(photos.length>1){
    h+=`<div class="m-gallery">`+photos.map(src=>`<img src="${esc(src)}" loading="lazy" onerror="this.style.display='none'" onclick="this.closest('.m-gallery').querySelectorAll('img').forEach(i=>i.classList.remove('active'));this.classList.add('active')">`).join('')+`</div>`;
  }

  h+='<div class="m-fields">';
  headers.forEach(k=>{
    if(allImgCols.includes(k)||!row[k])return;
    const v=row[k];
    const vh=isUrl(v)?`<a href="${esc(v)}" target="_blank">${esc(v.length>50?v.slice(0,50)+'…':v)}</a>`:esc(v);
    h+=`<div class="mf"><div class="mf-k">${esc(k)}</div><div class="mf-v">${vh}</div></div>`;
  });
  h+='</div>';
  document.getElementById('m-body').innerHTML=h;
  document.getElementById('mo').classList.add('open');
}
function closeMo(){ document.getElementById('mo').classList.remove('open'); }
document.getElementById('mo').onclick=e=>{ if(e.target.id==='mo')closeMo(); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeMo(); });

// ── VIEW TOGGLE ──────────────────────────────────────────────
function setView(v){
  view=v;
  document.getElementById('tw').style.display=v==='table'?'block':'none';
  document.getElementById('gw').style.display=v==='grid'?'block':'none';
  document.getElementById('vb-t').classList.toggle('on',v==='table');
  document.getElementById('vb-g').classList.toggle('on',v==='grid');
  render();
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  // Перевірка чи URL вставлений
  if(!API_URL || API_URL.includes('PASTE_YOUR')){
    document.getElementById('fp-grid').innerHTML='';
    document.getElementById('tw').innerHTML=
      `<div class="st">
        ⚙️
        <div style="font-weight:600">Потрібно налаштувати API URL</div>
        <div style="font-size:.75rem;color:#94a3b8;margin-top:.3rem">
          1. Розгорніть Apps Script як веб-додаток<br>
          2. Вставте отриманий URL у змінну <code>API_URL</code> на початку скрипту
        </div>
      </div>`;
    document.getElementById('ri').textContent='Не налаштовано';
    return;
  }

  try {
    toast('⏳ Завантаження даних…', 15000);
    const res = await fetch(API_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();

    if(data.error) throw new Error(data.error);

    headers         = data.headers;
    allRows         = data.rows;
    apiImageColumns = data.imageColumns || [];

    document.getElementById('total-count').textContent = data.total;
    if(data.updatedAt){
      const d=new Date(data.updatedAt);
      document.getElementById('hdr-updated').textContent =
        'Оновлено: '+d.toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    }

    detectCols();
    buildFilters();
    render();
    renderTags();
    toast(`✓ Завантажено ${data.total} позицій`);
  } catch(err) {
    document.getElementById('fp-grid').innerHTML='';
    document.getElementById('tw').innerHTML=
      `<div class="st">
        ⚠️
        <div style="font-weight:600">Помилка завантаження</div>
        <div style="font-size:.74rem;color:#94a3b8">${esc(err.message)}</div>
        <div style="font-size:.7rem;color:#94a3b8;margin-top:.4rem">
          Переконайтесь що доступ до веб-додатку відкрито для "Всіх"
        </div>
      </div>`;
    document.getElementById('ri').textContent='Помилка';
    console.error(err);
  }
}

init();
</script>
